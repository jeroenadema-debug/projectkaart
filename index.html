<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Projectkaart (CSV)</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- PapaParse (CSV reader) -->
<script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>

<script>
  // ✅ Zuid-Limburg bounds
  const zuidLimburgBounds = [
    [50.75, 5.55],
    [50.95, 6.10]
  ];

  // ✅ Kaart initialiseren
  const map = L.map('map', {
    maxBounds: zuidLimburgBounds,
    maxBoundsViscosity: 1.0,
    minZoom: 10,
    maxZoom: 17
  });

  // ✅ Startpositie
  map.fitBounds(zuidLimburgBounds);

  // ✅ Kaartlaag
  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    maxZoom: 17,
    attribution: '© OpenTopoMap'
  }).addTo(map);

  // ✅ CSV laden
  Papa.parse("projecten.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {

      const markers = [];

      results.data.forEach(function(p) {
        if (p.lat && p.lon) {

          const lat = parseFloat(p.lat);
          const lon = parseFloat(p.lon);

          const marker = L.marker([lat, lon]).addTo(map);

          // Tooltip
          marker.bindTooltip(
            `<b>${p.naam || ""}</b><br>
             ${p.info || ""}<br>
             Type: ${p.type || ""}<br>
             Status: ${p.status || ""}`
          );

          // Popup (FIXED!)
          marker.bindPopup(
            `<b>${p.naam || "Geen naam"}</b><br>
             ${p.info || ""}<br>
             Type: ${p.type || ""}<br>
             Status: ${p.status || ""}<br>
             <small>Lat: ${lat}, Lon: ${lon}</small>`
          );

          markers.push(marker);
        }
      });

      // ✅ Optioneel: zoom naar alle markers
      if (markers.length > 0) {
        const group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds());
      }
    }
  });

</script>
</body>
</html>
