<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Projectkaart met zoom</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Arial; }
    #map { height:100vh; }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>

<script>
const map = L.map('map').setView([50.85, 5.7], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Icons
const iconNieuwbouw = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [30, 50],
  iconAnchor: [15, 50]
});

const iconRenovatie = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [30, 50],
  iconAnchor: [15, 50]
});

const nieuwbouwLayer = L.layerGroup();
const renovatieLayer = L.layerGroup();
const markers = [];  // ✅ belangrijk voor zoom

Papa.parse("projecten.csv", {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    results.data.forEach(function(p) {
      if (!p.lat || !p.lon) return;

      const lat = parseFloat(p.lat);
      const lon = parseFloat(p.lon);
      const type = (p.type || "").trim();

      const icon = type === "Nieuwbouw" ? iconNieuwbouw : iconRenovatie;
      const marker = L.marker([lat, lon], { icon });

      markers.push(marker); // ✅ nodig voor fitBounds

      marker.bindTooltip(`
        <b>${p.naam}</b><br>
        Buurt: ${p.buurt}<br>
        Type: ${p.type}<br>
        Status: ${p.status}
      `);

      marker.bindPopup(`
        <b>${p.naam || "Geen naam"}</b><br>
        Buurt: ${p.buurt || ""}<br>
        Type: ${type}<br>
        Status: ${p.status || ""}
      `);

      if (type === "Nieuwbouw") {
        marker.addTo(nieuwbouwLayer);
      } else {
        marker.addTo(renovatieLayer);
      }
    });

    nieuwbouwLayer.addTo(map);
    renovatieLayer.addTo(map);

    L.control.layers(null, {
      "Nieuwbouw": nieuwbouwLayer,
      "Renovatie": renovatieLayer
    }).addTo(map);

    // ✅ Zoom naar alle markers
    if (markers.length > 0) {
      const group = new L.featureGroup(markers);
      map.fitBounds(group.getBounds());
    }
  }
});
</script>

</body>
</html>
