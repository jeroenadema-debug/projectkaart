<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Projectkaart compleet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body { margin:0; font-family: Arial; }
#container { display:flex; height:100vh; }
#map { flex:3; }
#sidebar { flex:1; overflow-y:auto; padding:10px; border-left:1px solid #ccc; }
li { padding:6px; cursor:pointer; }
li:hover { background:#f0f0f0; }
.active-item { background:#d0e8ff; font-weight:bold; }
</style>
</head>
<body>
<div id="container">
  <div id="map"></div>
  <div id="sidebar">
    <h3>Projecten</h3>
    <ul id="projectList" style="list-style:none; padding:0;"></ul>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>

<script>
const map = L.map('map').setView([50.85, 5.7], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const iconNieuwbouw = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [30, 50],
  iconAnchor: [15, 50]
});

const iconRenovatie = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [30, 50],
  iconAnchor: [15, 50]
});

const highlightIcon = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  iconSize: [40, 65],
  iconAnchor: [20, 65]
});

const markers = [];
let active = null;

function resetActive() {
  document.querySelectorAll('#projectList li').forEach(el => el.classList.remove('active-item'));
  if (active) {
    active.marker.setIcon(
      active.type === 'Nieuwbouw' ? iconNieuwbouw : iconRenovatie
    );
  }
}

Papa.parse("projecten.csv", {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {

    results.data.forEach((p, index) => {
      if (!p.lat || !p.lon) return;

      const lat = parseFloat(p.lat);
      const lon = parseFloat(p.lon);
      const type = (p.type || "").trim();

      const icon = type === 'Nieuwbouw' ? iconNieuwbouw : iconRenovatie;
      const marker = L.marker([lat, lon], { icon }).addTo(map);

      marker.bindPopup(`<b>${p.naam}</b><br>Buurt: ${p.buurt}<br>Type: ${p.type}<br>Status: ${p.status}`);

      // Tooltip (hover)      
		marker.bindTooltip(
  		`<b>${p.naam}</b><br>
  		Buurt: ${p.buurt}<br>
   		Type: ${p.type}<br>
   		Status: ${p.status}`
		);


      markers.push(marker);

      const li = document.createElement('li');
      li.textContent = p.naam;

      // lijst -> kaart
      li.onclick = () => {
        resetActive();

        map.setView(marker.getLatLng(), 15);
        marker.setIcon(highlightIcon);
        marker.openPopup();

        li.classList.add('active-item');
        active = { marker, type };
      };

      // kaart -> lijst
      marker.on('click', () => {
        resetActive();

        marker.setIcon(highlightIcon);
        li.classList.add('active-item');

        li.scrollIntoView({ behavior: 'smooth', block: 'center' });

        active = { marker, type };
      });

      document.getElementById('projectList').appendChild(li);
    });

    if (markers.length > 0) {
      const group = new L.featureGroup(markers);
      map.fitBounds(group.getBounds());
    }
  }
});
</script>

</body>
</html>
